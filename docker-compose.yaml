services:

  # =========================
  # HIVE METASTORE DATABASE
  # =========================
  postgres-metastore:
    image: postgres:13
    container_name: hive-metastore-db
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
      # تقليل memory بتاع postgres
      POSTGRES_SHARED_BUFFERS: 32MB
    ports:
      - "5435:5432"
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m

  # =========================
  # HIVE METASTORE SERVICE
  # =========================
  hive-metastore:
    image: apache/hive:3.1.3
    container_name: hive-metastore
    depends_on:
      - postgres-metastore
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      IS_RESUME: "true"
      # تقليل JVM heap
      HADOOP_HEAPSIZE: 256
    ports:
      - "9083:9083"
    volumes:
      - ./hive-conf/hive-site.xml:/opt/hive/conf/hive-site.xml
      - ./warehouse:/opt/hive/warehouse
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

  # =========================
  # SPARK MASTER
  # =========================
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    hostname: spark-master
    environment:
      SPARK_DAEMON_MEMORY: 256m
    command: >
      bash -c "
      /opt/spark/sbin/start-master.sh &&
      tail -f /opt/spark/logs/spark--org.apache.spark.deploy.master*.out
      "
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./warehouse:/opt/spark/warehouse
      - ./apps:/opt/spark-apps
      - ./spark-ivy:/tmp/.ivy
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

  # =========================
  # SPARK WORKER
  # =========================
  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker
    hostname: spark-worker
    environment:
      SPARK_DAEMON_MEMORY: 256m
    command: >
      bash -c "
      /opt/spark/sbin/start-worker.sh spark://spark-master:7077 --cores 2 --memory 1500m &&
      tail -f /opt/spark/logs/spark--org.apache.spark.deploy.worker*.out"
    ports:
      - "8081:8081"
      - "4040:4040"
      - "10000:10000"
    depends_on:
      - spark-master
      - hive-metastore
    volumes:
      - ./warehouse:/opt/spark/warehouse
      - ./apps:/opt/spark-apps
      - ./spark-ivy:/tmp/.ivy
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 1g

  # =========================
  # KAFKA (KRaft mode)
  # =========================
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_EXTERNAL://host.docker.internal:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LOG_DIRS: /var/kafka-data
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"
      KAFKA_LOG_RETENTION_HOURS: 1
      KAFKA_LOG_SEGMENT_BYTES: 10485760
    volumes:
      - ./kafka-data:/var/kafka-data
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      JAVA_OPTS: "-Xmx128m -Xms64m"
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m